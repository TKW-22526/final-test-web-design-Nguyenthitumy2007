<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản Phẩm - Kho Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="../index.html"><i class="bi bi-controller"></i> GAMEZONE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Trang Chủ</a></li>
                    <li class="nav-item"><a class="nav-link active" href="san-pham.html">Sản Phẩm</a></li>
                    <li class="nav-item"><a class="nav-link" href="gioi-thieu.html">Giới Thiệu</a></li>
                    <li class="nav-item"><a class="nav-link" href="lien-he.html">Liên Hệ</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="text-center mb-5 fw-bold text-primary text-uppercase">Kho Game Đa Dạng</h2>

        <div class="d-flex justify-content-center gap-2 mb-5 flex-wrap" id="category-filters">
            <button class="btn btn-outline-danger active" onclick="filterGames('all')">Tất cả</button>
            <button class="btn btn-outline-danger" onclick="filterGames('hanh-dong')">Hành Động</button>
            <button class="btn btn-outline-danger" onclick="filterGames('chien-thuat')">Chiến Thuật</button>
            <button class="btn btn-outline-danger" onclick="filterGames('nhap-vai')">Nhập Vai</button>
            <button class="btn btn-outline-danger" onclick="filterGames('the-thao')">Thể Thao</button>
            <button class="btn btn-outline-danger" onclick="filterGames('giai-tri')">Giải trí</button>
        </div>

        <div class="row" id="all-games-list">
        </div>
    </div>

    <footer class="text-white text-center py-4 mt-5">
        <p class="mb-0">© 2026 GameZone. Thiết kế bởi MỸ MỸ.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
    <script>
        const gamesListContainer = document.getElementById('all-games-list');

        function displayGames(games) {
            gamesListContainer.innerHTML = '';
            if(games.length === 0) {
                gamesListContainer.innerHTML = `<h3 class="text-center text-secondary">Không tìm thấy game nào!</h3>`;
                return;
            }
            games.forEach(game => {
                gamesListContainer.innerHTML += createGameCard(game, "../");
            });
        }

        function filterGames(category) {
            const buttons = document.querySelectorAll('#category-filters button');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (category === 'all') {
                displayGames(gamesData);
            } else {
                const filtered = gamesData.filter(g => g.category === category);
                displayGames(filtered);
            }
        }

        displayGames(gamesData);
    </script>
</body>
</html>
