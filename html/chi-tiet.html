<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="../index.html"><i class="bi bi-controller"></i> GAMEZONE</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Trang Chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="san-pham.html">Sản Phẩm</a></li>
                    <li class="nav-item"><a class="nav-link" href="gioi-thieu.html">Giới Thiệu</a></li>
                    <li class="nav-item"><a class="nav-link" href="lien-he.html">Liên Hệ</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5" id="game-details-section">
    </div>

    <footer class="text-white text-center py-4 mt-5">
        <p class="mb-0">© 2026 GameZone. Thiết kế bởi MỸ MỸ.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
    <script>

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = parseInt(urlParams.get('id'));

        const game = gamesData.find(g => g.id === gameId);

        const detailsContainer = document.getElementById('game-details-section');

        if (game) {

            detailsContainer.innerHTML = `
                <div class="row">
                    <div class="col-md-5 mb-4">
                        <img src="${game.image}" class="img-fluid rounded shadow-lg border border-secondary" alt="${game.title}" style="width: 100%; max-height: 400px; object-fit: cover;">
                    </div>
                    <div class="col-md-7">
                        <span class="badge bg-danger mb-2">${game.categoryName}</span>
                        <span class="text-warning ms-2 fw-bold">${game.rating} <i class="bi bi-star-fill"></i></span>
                        <h1 class="display-5 fw-bold text-white mb-3">${game.title}</h1>
                        <p class="lead text-secondary">${game.description}</p>
                        
                        <h4 class="mt-4 text-danger">Tính năng nổi bật:</h4>
                        <ul>
                            ${game.features.map(f => `<li>${f}</li>`).join('')}
                        </ul>

                        <div class="mt-4">
                            <a href="${game.downloadUrl}" target="_blank" class="btn btn-danger btn-lg px-4 py-3 fw-bold">
                                <i class="bi bi-google-play"></i> TẢI NGAY TRÊN CH PLAY
                            </a>
                            <a href="san-pham.html" class="btn btn-outline-light btn-lg ms-2">
                                <i class="bi bi-arrow-left"></i> Quay lại
                            </a>
                        </div>
                    </div>
                </div>
            `;
        } else {
            // Trường hợp không tìm thấy ID game tương ứng
            detailsContainer.innerHTML = `
                <div class="text-center py-5">
                    <h2>Rất tiếc! Không tìm thấy thông tin game này.</h2>
                    <a href="san-pham.html" class="btn btn-danger mt-3">Quay lại Kho Game</a>
                </div>
            `;
        }
    </script>
</body>
</html>
