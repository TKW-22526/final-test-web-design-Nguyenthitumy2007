<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ - GameZone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="../index.html"><i class="bi bi-controller"></i> GAMEZONE</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Trang Chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="san-pham.html">Sản Phẩm</a></li>
                    <li class="nav-item"><a class="nav-link" href="gioi-thieu.html">Giới Thiệu</a></li>
                    <li class="nav-item"><a class="nav-link active" href="lien-he.html">Liên Hệ</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5 text-white">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold text-info">LIÊN HỆ</h1>
            <p class="lead text-secondary">Gửi ý kiến đóng góp hoặc yêu cầu cập nhật game mới cho chúng tôi</p>
        </div>

        <div class="row">
            <div class="col-md-6 mb-5">
                <div class="p-4 rounded border border-secondary bg-dark">
                    <h4 class="text-info mb-4 fw-bold">Gửi Phản Hồi</h4>
                    <form id="contactForm" onsubmit="handleSubmit(event)">
                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" class="form-control bg-secondary text-white border-0" required placeholder="Nguyễn Văn A">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control bg-secondary text-white border-0" required placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Lời nhắn</label>
                            <textarea class="form-control bg-secondary text-white border-0" rows="4" required placeholder="Bạn muốn đóng góp ý kiến gì..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 fw-bold">GỬI NGAY</button>
                    </form>
                </div>
            </div>
            <div class="col-md-6">
                <div class="p-4 rounded border border-secondary bg-dark h-100">
                    <h4 class="text-primary mb-4 fw-bold">Thông Tin Liên Hệ</h4>
                    <p><i class="bi bi-geo-alt text-primary me-2"></i> Địa chỉ: Đại Học Trà Vinh</p>
                    <p><i class="bi bi-telephone text-primary me-2"></i> Điện thoại: 0327478562</p>
                    <p><i class="bi bi-envelope text-primary me-2"></i> Email: sumynguyen2007@gmail.com</p>
                    
                </div>
            </div>
        </div>
    </div>

    <footer class="text-white text-center py-4 mt-5">
        <p class="mb-0">© 2026 GameZone. Thiết kế bởi MỸ MỸ.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function handleSubmit(event) {
            event.preventDefault();
            alert("Cảm ơn bạn đã liên hệ! GameZone sẽ phản hồi sớm nhất có thể.");
            document.getElementById('contactForm').reset();
        }
    </script>
</body>
</html>
